# Multi-AI Run Routing Configuration
# 역할별 AI 모델 라우팅 설정
#
# 사용법:
#   - 이 파일을 수정하여 각 역할에 사용할 모델을 변경
#   - 프로젝트별로 .claude/routing.config.yaml에 오버라이드 가능
#
# 우선순위:
#   1. 프로젝트 설정: .claude/routing.config.yaml
#   2. 글로벌 설정: ~/.claude/routing.config.yaml
#   3. 스킬 기본값: skills/multi-ai-run/routing.config.yaml

---
version: 1.0

# CLI 도구별 모델 설정
cli_models:
    gemini:
        command: "gemini"
        model: "gemini-3.1-pro-preview" # 기본 모델
        # model: "gemini-2.0-flash"      # 빠른 응답용
        # model: "gemini-3-flash-preview" # 경량 작업용
        args: "--output-format text"
        emoji: "💎"

    codex:
        command: "codex exec"
        model: "gpt-5.4" # 기본 모델
        # model: "o3"           # 추론 강화 모델
        # model: "gpt-4.1"      # 범용 모델
        args: "--sandbox workspace-write" # 프로젝트 폴더 직접 읽기/쓰기 허용
        emoji: "🤖"

    claude:
        command: "claude"
        # model: "opus"           # 기본 모델
        model: "sonnet" # 빠른 응답용
        args: "--dangerously-skip-permissions"
        emoji: "🧠"

# 역할별 모델 라우팅
role_routing:
    # 코드 작업 → Codex
    backend-specialist: codex
    test-specialist: codex
    api-designer: codex
    security-specialist: codex
    devops-specialist: codex

    # 디자인/UI 작업 → Gemini
    frontend-specialist: gemini
    chief-designer: gemini
    design-system: gemini

    # 기획/조율/아키텍처 → Claude
    project-manager: claude
    chief-architect: claude
    orchestrator: claude

# 태스크 유형별 라우팅 (역할보다 우선)
task_type_routing:
    code_generation: codex
    code_review: codex
    refactoring: codex
    testing: codex

    ui_implementation: gemini
    design_review: gemini
    styling: gemini

    architecture: claude
    planning: claude
    coordination: claude

# 도메인별 라우팅
domain_routing:
    auth: codex
    payment: codex
    api: codex

    ui: gemini
    design: gemini

    # 명시되지 않은 도메인은 기본값 사용

# 기본 설정
defaults:
    model: claude # 매칭 규칙 없을 때 기본 모델
    fallback_enabled: true # CLI 실패 시 Claude 폴백
    timeout: 120 # CLI 실행 타임아웃 (초)
    retry_count: 2 # 실패 시 재시도 횟수

# 실행 모드
execution:
    # dry_run: false           # true면 실제 실행 없이 계획만 출력
    parallel: true # 독립 태스크 병렬 실행
    verbose: false # 상세 로그 출력
