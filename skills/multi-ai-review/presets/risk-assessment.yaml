# 리스크 평가 프리셋
# 트리거 키워드: 리스크, 위험, risk, 보안 평가, 취약점, compliance

name: risk-assessment
display: "리스크 평가"

# 평가 차원 및 가중치 (합계 = 1.0)
dimensions:
  probability: { weight: 0.25, label: "발생 확률" }
  impact:      { weight: 0.30, label: "영향도" }
  mitigation:  { weight: 0.20, label: "완화 가능성" }
  detection:   { weight: 0.15, label: "탐지 용이성" }
  urgency:     { weight: 0.10, label: "긴급도" }

# 멤버별 역할 정의
roles:
  gemini: "외부 위협 분석가 — 시장, 규제, 경쟁, 기술 변화 리스크"
  codex:  "내부 취약점 분석가 — 시스템, 프로세스, 인력, 재무 리스크"

# 판정 출력 설정
output:
  verdict_options: ["Critical", "High", "Medium", "Low", "Negligible"]
  verdict_label: "리스크 등급"
