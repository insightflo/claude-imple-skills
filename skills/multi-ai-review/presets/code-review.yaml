# 코드 리뷰 프리셋
# 트리거 키워드: 리뷰, review, PR, 코드 검토, merge, 코드 품질, pull request

name: code-review
display: "코드 리뷰"

# 평가 차원 및 가중치 (합계 = 1.0)
dimensions:
  security:       { weight: 0.25, label: "보안" }
  performance:    { weight: 0.20, label: "성능" }
  maintainability: { weight: 0.25, label: "유지보수성" }
  correctness:    { weight: 0.20, label: "정확성" }
  style:          { weight: 0.10, label: "스타일" }

# 멤버별 역할 정의
roles:
  gemini: "Creative & Architecture Reviewer — 아키텍처, UX, 혁신적 대안 중심"
  codex:  "Technical & Pattern Reviewer — SOLID, 보안, 성능 패턴 분석"

# Done-When 검증 (배포 전 필수 검증)
done_when:
  - pattern: "algorithm\\s*['\"]\\s*none\\s*['\"]"
    context: "src/"
    explanation: "JWT 'none' 알고리즘 취약점 — 알고리즘 검증 우회 방지"
  - pattern: "process\\.env\\.(API_KEY|SECRET|PASSWORD|TOKEN)"
    context: "src/"
    explanation: "하드코딩된 시크릿 — 환경 변수 직접 참조 금지"
  - pattern: "eval\\(|new Function\\(|setTimeout\\(\\s*['\"]"
    context: "src/"
    explanation: "안전하지 않은 동적 코드 실행 — XSS/인젝션 위험"
  - pattern: "SELECT\\s+.*\\s+FROM\\s+.*WHERE\\s+.*=\\s*['\"]?[^\\s]+['\"]?(\\s*$|\\s*;)"
    context: "src/"
    explanation: "SQL Injection 가능성 — 파라미터화된 쿼리 사용"
  - pattern: "console\\.log\\(|console\\.debug\\(|print\\("
    context: "src/"
    explanation: "배포 전 디버그 로그 제거 필요"

