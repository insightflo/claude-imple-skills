# TASKS.md 메타데이터 포맷 (v2.0.0)
#
# Dependency-aware, Domain-guarded 태스크 정의
#
# 각 태스크는 다음 메타데이터를 가질 수 있습니다:
#
# - [ ] T1.1: 태스크 제목
#   - description: 상세 설명
#   - deps: [T1.0, T0.5]           # 선행 태스크 ID 목록
#   - domain: backend|frontend|shared  # 도메인 분리 (병렬 실행 제어)
#   - risk: low|medium|critical     # 위험도 (critical은 직렬 실행)
#   - files: src/**/*.ts            # 영향 파일 패턴 (충돌 감지용)
#   - owner: backend-specialist     # 담당 에이전트
#   - model: sonnet|gemini          # 선택: owner/model-routing을 덮는 명시적 override
#
# 메타데이터 설명:
# =================
#
# deps (의존성)
#   - 선행 태스크가 완료되어야만 실행 가능
#   - orchestrate-standalone이 DAG로 변환하여 병렬 실행 계획 수립
#   - 예: deps: [T1.1, T1.2] → T1.1과 T1.2가 완료된 후 실행
#
# domain (도메인)
#   - backend: 백엔드 영역 (API, 서비스, DB)
#   - frontend: 프론트엔드 영역 (UI, 컴포넌트, 화면)
#   - shared: 공용 영역 (타입, 유틸, 상수)
#   - 같은 도메인 태스크는 파일 충돌 감지 대상
#
# risk (위험도)
#   - low: 안전한 태스크 (병렬 실행 가능)
#   - medium: 주의 필요 (같은 파일 접근 직렬화)
#   - critical: 위험 태스크 (항상 직렬 실행)
#   - 예: payment, auth, database migration 등
#
# files (영향 파일)
#   - 태스크가 수정하는 파일 패턴
#   - glob 패턴 사용: src/domains/user/*.ts
#   - 같은 파일을 수정하는 태스크는 충돌하여 직렬 실행
#
# owner (담당 에이전트)
#   - project-manager: 프로젝트 관리, 조율
#   - chief-architect: 아키텍처 설계, 표준 정의
#   - chief-designer: 디자인 시스템, UI 가이드
#   - backend-specialist: 백엔드 구현
#   - frontend-specialist: 프론트엔드 구현
#   - security-specialist: 보안 검토
#   - qa-manager: 품질 관리, 테스트
#   - dba: DB 스키마, 마이그레이션
#
# model (사용 모델)
#   - 선택 필드이며, 없으면 owner와 model-routing.yaml 기반 자동 라우팅 사용
#   - sonnet: Claude Sonnet (일반 코딩, 논리)
#   - gemini: Gemini 3.0 (디자인 코딩, UI)
#   - haiku: Claude Haiku (빠른 수정)
#
# 사용 예시:
# =========
#
# ## T1 - User Authentication
#
# - [ ] T1.1: 사용자 인증 API 설계
#   - description: JWT 기반 사용자 인증 API를 설계합니다.
#   - deps: [T0.2]
#   - domain: backend
#   - risk: critical
#   - files: src/domains/auth/*.ts, src/api/auth/*.ts
#   - owner: backend-specialist
#   - model: codex   # 선택: backend-specialist 기본 라우팅을 명시적으로 고정하고 싶을 때만 사용
#
# - [ ] T1.2: 로그인 화면 구현
#   - description: 로그인 폼과 인증 로직을 연결합니다.
#   - deps: [T1.1]
#   - domain: frontend
#   - risk: medium
#   - files: src/screens/Login/*.tsx
#   - owner: frontend-specialist
#   # model 생략 -> frontend-specialist owner 기준 자동 라우팅
#
# - [ ] T1.3: 인증 보안 검토
#   - description: OWASP Top 10 기반 보안 검토를 수행합니다.
#   - deps: [T1.1, T1.2]
#   - domain: shared
#   - risk: critical
#   - owner: security-specialist
#   # model 생략 -> security-specialist owner/model-routing 기준 자동 라우팅
