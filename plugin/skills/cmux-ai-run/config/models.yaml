# cmux-ai-run 모델 설정
# 프로젝트별 오버라이드: .claude/cmux-ai-models.yaml

models:
  codex:
    command: "codex"
    model: "gpt-5.4"
    effort: "high"        # low | medium | high
    oneshot: "codex exec"
    interactive_submit: "enter enter"  # Enter 2번으로 제출

  gemini:
    command: "gemini"
    model: "gemini-3-flash-preview"
    args: "-y"            # auto-approve (YOLO)
    oneshot: "gemini -y -m gemini-3-flash-preview -p"
    interactive_submit: "enter"  # Enter 1번으로 제출

  claude:
    command: "claude"
    model: "opus"         # opus | sonnet | haiku
    args: "--dangerously-skip-permissions"

# 역할별 기본 AI 배정
routing:
  code_generation: codex
  code_review: codex
  refactoring: codex
  test_writing: codex
  design_implementation: gemini
  ui_components: gemini
  design_review: gemini
  architecture: claude
  planning: claude
  orchestration: claude

# 도메인별 오버라이드 (선택)
